services:
  app:
    image: ${QADAM_FLOW_IMAGE:-ghcr.io/aiqadam/qadam-flow:latest}
    container_name: qadam-flow-app
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - postgres
      - redis
    env_file: .env
    environment:
      - AP_CONTAINER_TYPE=APP
      - AP_QADAMS_SYNC_MODE=NONE
    volumes:
      - ./cache:/usr/src/app/cache
    networks:
      - qadam-flow
  worker:
    image: ${QADAM_FLOW_IMAGE:-ghcr.io/aiqadam/qadam-flow:latest}
    restart: unless-stopped
    depends_on:
      - app
    env_file: .env
    environment:
      - AP_CONTAINER_TYPE=WORKER
      - AP_WORKER_API_URL=http://app:80
    deploy:
      replicas: 5
    volumes:
      - ./cache:/usr/src/app/cache
    networks:
      - qadam-flow
  postgres:
    image: 'pgvector/pgvector:0.8.0-pg14'
    container_name: postgres
    restart: unless-stopped
    env_file: .env
    environment:
      - 'POSTGRES_DB=${AP_POSTGRES_DATABASE}'
      - 'POSTGRES_PASSWORD=${AP_POSTGRES_PASSWORD}'
      - 'POSTGRES_USER=${AP_POSTGRES_USERNAME}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qadam-flow
  redis:
    image: 'redis:7.0.7'
    container_name: redis
    restart: unless-stopped
    volumes:
      - 'redis_data:/data'
    networks:
      - qadam-flow
volumes:
  postgres_data:
  redis_data:
networks:
  qadam-flow:
