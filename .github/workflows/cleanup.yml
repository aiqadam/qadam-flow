name: Cleanup

on:
  schedule:
    - cron: '0 0 * * *'  # daily at 00:00 UTC
  workflow_dispatch:
    inputs:
      retain_days:
        description: 'Days to retain runs'
        required: false
        default: '30'
      minimum_runs:
        description: 'Minimum runs to keep per workflow'
        required: false
        default: '10'

permissions:
  actions: write
  contents: read

jobs:
  delete-old-runs:
    name: Delete old workflow runs
    runs-on: ubuntu-latest
    steps:
      - uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: ${{ github.event.inputs.retain_days || '30' }}
          keep_minimum_runs: ${{ github.event.inputs.minimum_runs || '10' }}
