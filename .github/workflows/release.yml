name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint core packages
        run: npm run lint-core

      - name: Lint qadams
        run: npm run lint-qadams

      - name: Unit tests
        run: npm run test-unit

  build:
    name: Build ${{ matrix.platform }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            cacheScope: monolith-amd64
            artifactSuffix: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cacheScope: monolith-arm64
            artifactSuffix: linux-arm64
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/aiqadam/qadam-flow
          labels: |
            org.opencontainers.image.title=Qadam Flow
            org.opencontainers.image.description=Open-source AI-first workflow automation platform
            org.opencontainers.image.source=https://github.com/aiqadam/qadam-flow

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cacheScope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cacheScope }}
          outputs: type=image,name=ghcr.io/aiqadam/qadam-flow,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest='${{ steps.build.outputs.digest }}'
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.artifactSuffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Push manifest & GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/aiqadam/qadam-flow
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Create multi-arch manifest and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/aiqadam/qadam-flow@sha256:%s ' *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            ghcr.io/aiqadam/qadam-flow:${{ steps.meta.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            Docker image: `ghcr.io/aiqadam/qadam-flow:${{ steps.meta.outputs.version }}`

            Supported platforms: `linux/amd64`, `linux/arm64`.

            ## Install

            ```bash
            docker pull ghcr.io/aiqadam/qadam-flow:${{ steps.meta.outputs.version }}
            ```
